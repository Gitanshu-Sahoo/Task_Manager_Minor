<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="TM_style.css">
</head>

<body>

    <div class="container">

        <h1>🗒️✏️ Task Manager 🗒️✏️</h1>
        <div class="stats">

            <div class="card">
                <h3>Pending</h3>
                <p id="pendingCount">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completedCount">0</p>
            </div>

        </div>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task"
            >

            <select id="priority">

                <option value="high">
                    High
                </option>

                <option value="medium">
                    Medium
                </option>

                <option value="low">
                    Low
                </option>

            </select>

            <input
                type="date"
                id="dueDate"
            >

            <button id="addBtn">
                Add
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>
    
<script src="TM_script.js"></script>

</body>
</html>
